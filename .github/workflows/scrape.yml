name: Noclout Scraper

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - verify_only
  
  # Run daily at midnight UTC (which is 1AM CET)
  schedule:
    - cron: '0 0 * * *'

env:
  PYTHON_VERSION: '3.12'
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

jobs:
  scrape:
    name: Run Scraper
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-models-
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Verify environment
        if: inputs.run_type == 'verify_only'
        run: |
          python -c "
          from scraper import NocloutScraper
          print('✓ Scraper imports OK')
          from supabase import create_client
          print('✓ Supabase client OK')
          "
      
      - name: Run scraper
        if: inputs.run_type == 'full'
        run: |
          python scraper.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      
      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: |
            scraper_errors.log
            scraper_log_*.log
          retention-days: 7

  summary:
    name: Run Summary
    runs-on: ubuntu-latest
    needs: scrape
    if: always()
    
    steps:
      - name: Download logs
        if: needs.scrape.result == 'failure'
        uses: actions/download-artifact@v4
        with:
          name: scraper-logs
          path: logs
      
      - name: Show failure info
        if: needs.scrape.result == 'failure'
        run: |
          echo "## Scraper Failed"
          echo "Please check the logs for details."
          if [ -d logs ]; then
            echo "### Log Files"
            ls -la logs/
          fi
