name: Noclout Scraper

on:
  workflow_dispatch:
    inputs:
      run_type:
        description: 'Run type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - verify_only
  
  schedule:
    - cron: '0 0 * * *'

env:
  PYTHON_VERSION: '3.12'

jobs:
  scrape:
    name: Run Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: hf-models-v1
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Verify environment and secrets
        if: inputs.run_type == 'verify_only'
        run: |
          python -c "
          import os
          print('=== Environment Check ===')
          supabase_url = os.environ.get('SUPABASE_URL', '')
          supabase_key = os.environ.get('SUPABASE_KEY', '')
          print(f'SUPABASE_URL: {\"SET\" if supabase_url else \"NOT SET\"}')
          print(f'SUPABASE_KEY: {\"SET (\" + str(len(supabase_key)) + \" chars)\" if supabase_key else \"NOT SET\"}')
          
          if supabase_url and supabase_key:
              from supabase import create_client
              client = create_client(supabase_url, supabase_key)
              print('✓ Supabase client created')
              
              try:
                  result = client.table('products').select('id').limit(1).execute()
                  print('✓ Database connection OK')
                  print(f'✓ Products table accessible')
              except Exception as e:
                  print(f'✗ Database error: {e}')
          else:
              print('✗ Secrets not properly configured in GitHub!')
              print('Go to: Settings → Secrets and variables → Actions')
              exit(1)
          "
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      
      - name: Run scraper with retry
        if: inputs.run_type == 'full'
        run: |
          echo "Starting scraper with retry logic..."
          for i in 1 2 3; do
            echo "Attempt $i of 3..."
            python scraper.py && exit 0
            echo "Attempt $i failed (exit code $?), waiting 15s..."
            sleep 15
          done
          echo "All attempts failed"
          exit 1
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        timeout-minutes: 25

  summary:
    name: Run Summary
    runs-on: ubuntu-latest
    needs: scrape
    if: always()
    
    steps:
      - name: Check result
        run: |
          echo "=== Scraper Run Result ==="
          if [ "${{ needs.scrape.result }}" == "success" ]; then
            echo "✅ Completed successfully"
          elif [ "${{ needs.scrape.result }}" == "failure" ]; then
            echo "❌ Failed - Common causes:"
            echo "  • Network/DNS not working in GitHub Actions"
            echo "  • Missing or incorrect secrets"
            echo "  • Supabase project suspended"
            echo ""
            echo "=== Debug Steps ==="
            echo "1. Go to: https://github.com/Samuel-Pawlas/scraper-noclout/settings/secrets/actions"
            echo "2. Verify SUPABASE_URL and SUPABASE_KEY are set"
            echo "3. Try 'Verify only' run first to test connectivity"
            exit 1
          else
            echo "⚠️ Cancelled or inconclusive"
            exit 1
          fi